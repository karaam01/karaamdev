<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaraamDev | О компании</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.2);
            max-width: 550px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }
        p { color: #94a3b8; line-height: 1.8; font-size: 1.1rem; margin-bottom: 2rem; }
        .nav-links a {
            color: #f8fafc;
            text-decoration: none;
            padding: 12px 28px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .nav-links a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>О KaraamDev</h1>
        <p>KaraamDev — это передовая студия разработки, специализирующаяся на создании высокопроизводительных веб-сервисов и сложных архитектурных решений. Мы превращаем идеи в цифровой код будущего.</p>
        <div class="nav-links">
            <a href="/">Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
