<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaraamDev | Заказать проект</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 2.5rem;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(56, 189, 248, 0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; color: #94a3b8; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            border: none;
            border-radius: 12px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }
        .success-msg {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Меню переговоров</h1>
        
        {% if success %}
            <div class="success-msg">Заявка успешно отправлена! Мы свяжемся с вами в ближайшее время.</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" name="name" required placeholder="Иван Иванов">
            </div>
            <div class="form-group">
                <label>Ваш Email</label>
                <input type="email" name="email" required placeholder="example@mail.com">
            </div>
            <div class="form-group">
                <label>Опишите ваш проект</label>
                <textarea name="message" rows="4" required placeholder="Что мы будем разрабатывать?"></textarea>
            </div>
            <button type="submit">Отправить заявку</button>
        </form>
        
        <div class="back-link">
            <a href="/">← Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
