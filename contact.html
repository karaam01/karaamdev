<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaraamDev | Контакты</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.2);
            min-width: 400px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }
        .info { margin-bottom: 2.5rem; text-align: left; display: inline-block; }
        .info p { color: #94a3b8; font-size: 1.1rem; margin: 10px 0; }
        .info span { color: #38bdf8; font-weight: bold; }
        .nav-links a {
            color: #f8fafc;
            text-decoration: none;
            padding: 12px 28px;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .nav-links a:hover {
            background: #38bdf8;
            color: #0f172a;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Связь с нами</h1>
        <div class="info">
            <p><span>Email:</span> hello@karaamdev.ru</p>
            <p><span>Telegram:</span> @karaamdev_tech</p>
            <p><span>Локация:</span> Digital Nomad / Remote</p>
        </div>
        <div class="nav-links">
            <a href="/">На главную</a>
        </div>
    </div>
</body>
</html>
